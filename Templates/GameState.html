<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>GameState</title>

        <link rel="stylesheet" href="{{ url_for('static', filename='Styles.css') }}">
        <script defer src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
        <script defer src="{{ url_for('static', filename='js/GameState.js') }}"></script>
    </head>
    <body data-user-id="{{ session['user_id'] }}">
        <div class="screen-wrapper">
            <div class="app">
                <div class="game-table">
                    <div class="top-bar">
                        <a href="/">
                            <img class="logo-small" src="{{ url_for('static', filename='textures/logo.png') }}" alt="LOGO">
                        </a>
                    </div>

                    <div id="table-status-chip" class="box table-status-chip">
                        <div id="table-status-text" class="table-status-text">Waiting for game state...</div>
                    </div>

                    <div id="help-open-hint" class="help-open-hint">Press Esc for rules and turn help</div>

                    <div id="opponents-layer" class="opponents-layer"></div>

                    <div class="center-piles">
                        <div class="pile-wrapper">
                            <button type="button" class="card pile-card" id="deck-pile" aria-label="Deck pile"></button>
                            <div class="pile-caption">Deck</div>
                        </div>

                        <div class="pile-wrapper">
                            <button type="button" class="card pile-card" id="discard-pile" aria-label="Discard pile"></button>
                            <div class="pile-caption">Discard</div>
                        </div>
                    </div>

                    <div id="meld-area" class="meld-area"></div>

                    <div class="player-hand-wrapper">
                        <div id="current-player-label" class="current-player-label">Player</div>
                        <div id="hand-action-bar" class="hand-action-bar"></div>
                        <div id="player-hand" class="player-hand"></div>
                    </div>

                    <button type="button" class="box button small-button sort-hand-button" id="sort-hand-button">
                        Sort<br>Hand
                    </button>

                    <div id="help-modal" class="modal-overlay">
                        <div class="modal-content help-modal-content">
                            <div class="help-header">
                                <div class="rule-label">How To Play</div>
                                <button type="button" class="box button small-button" id="help-close">X</button>
                            </div>

                            <div id="help-content" class="help-sections"></div>
                        </div>
                    </div>

                    <div id="game-paused-overlay" class="game-paused-overlay" style="display: none;">
                        <div class="box game-paused-box">
                            <div id="game-paused-text" class="game-paused-text">
                                The game has been paused.
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </body>
</html>
